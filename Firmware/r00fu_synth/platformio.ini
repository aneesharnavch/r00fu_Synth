; ===========================================================================
; r00fu_synth — PlatformIO project
; Board: ESP32-S3-DevKitC-1 (dual USB-C). Flash to the *USB* (native) port.
; ===========================================================================
[platformio]
default_envs = esp32-s3-devkitc-1

[env:esp32-s3-devkitc-1]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; --- upload / monitor (over native USB-CDC) ---
monitor_speed = 115200
upload_speed  = 921600

; --- chip / memory ---
board_build.mcu       = esp32s3
board_build.f_cpu     = 240000000L
; 16MB layout with a LittleFS data partition for presets.
; If your module is N8 (8MB), switch to default_8MB.csv.
board_build.partitions = default_16MB.csv
board_build.filesystem = littlefs

build_flags =
  -DARDUINO_USB_MODE=0           ; 0 = TinyUSB (needed for composite CDC+MIDI)
  -DARDUINO_USB_CDC_ON_BOOT=1    ; Serial = native USB (GUI console + logs)
  -DBOARD_HAS_PSRAM=0            ; PSRAM OFF -> GPIO35/36/37 free for the mux
  -DCORE_DEBUG_LEVEL=1
  ; Include roots. `include/` holds the locked contract (config/events/midi_map).
  ; `src` lets a file say "drivers/mux.h"; each module dir lets a file include a
  ; sibling header by bare name ("synth.h", "midi_din.h", ...). The codebase uses
  ; BOTH styles, so every src subdir is on the path.
  -Iinclude
  -Isrc
  -Isrc/system
  -Isrc/drivers
  -Isrc/audio
  -Isrc/sequencer
  -Isrc/storage
  -Isrc/ui

; --- open-source dependencies (the "lean on premade software" stack) ---
lib_deps =
  fortyseveneffects/MIDI Library @ ^5.0.2      ; DIN MIDI parse/serialize
  adafruit/Adafruit TinyUSB Library @ ^3.1.5   ; USB-MIDI + USB-CDC composite
  dxinteractive/ResponsiveAnalogRead @ ^1.2.1  ; knob/slider smoothing
  bblanchon/ArduinoJson @ ^7.1.0               ; presets + config serialize
  adafruit/Adafruit NeoPixel @ ^1.12.3         ; on-board status LED
  ; ML_SynthTools is the DSP reference for the synth/effects. Enable when you
  ; want to swap in its engines; the built-in engine compiles without it.
  ; marcel-licence/ML_SynthTools

; ---------------------------------------------------------------------------
; PSRAM variant (optional). Requires moving S0/S1/S2 to 39/47/48 in config.h.
; ---------------------------------------------------------------------------
[env:esp32-s3-devkitc-1-psram]
extends = env:esp32-s3-devkitc-1
build_flags =
  ${env:esp32-s3-devkitc-1.build_flags}
  -UBOARD_HAS_PSRAM
  -DBOARD_HAS_PSRAM=1
board_build.arduino.memory_type = qio_opi   ; octal PSRAM
